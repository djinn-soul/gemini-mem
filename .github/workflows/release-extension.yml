name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches versions
        run: |
          node -e "const tag=process.env.GITHUB_REF_NAME.replace(/^v/,'');const p=require('./package.json').version;const m=require('./gemini-extension.json').version;if(tag!==p||tag!==m){console.error(`Version mismatch. tag=${tag}, package.json=${p}, gemini-extension.json=${m}`);process.exit(1);}"

      - name: Verify required extension files exist
        shell: bash
        run: |
          test -f gemini-extension.json
          test -f README.md
          test -f LICENSE
          test -f hooks/hooks.json
          test -f scripts/hook-runner.cjs
          test -d commands
          test -d dist

      - name: Verify dist is committed in tag source
        shell: bash
        run: |
          test -n "$(git ls-files dist)"

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${VERSION}" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build

      - name: Type and codebase checks
        run: npm run typecheck && npm run check:max-lines

      - name: Test
        run: npm run test

      - name: Create release archives
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="out/stage"
          mkdir -p "${STAGE}"
          mkdir -p "${STAGE}/dist" "${STAGE}/hooks" "${STAGE}/commands" "${STAGE}/scripts"

          cp gemini-extension.json "${STAGE}/"
          cp README.md "${STAGE}/"
          cp LICENSE "${STAGE}/"
          cp hooks/hooks.json "${STAGE}/hooks/hooks.json"
          cp scripts/hook-runner.cjs "${STAGE}/scripts/hook-runner.cjs"
          cp -R commands/. "${STAGE}/commands/"
          cp -R dist/. "${STAGE}/dist/"

          tar -C "${STAGE}" -czf "out/gemini-mem-${VERSION}.tar.gz" .
          (
            cd "${STAGE}"
            zip -rq "../gemini-mem-${VERSION}.zip" .
          )
          sha256sum out/gemini-mem-"${VERSION}".tar.gz out/gemini-mem-"${VERSION}".zip > out/SHA256SUMS.txt

      - name: Validate release archive structure
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_FILE="out/gemini-mem-${VERSION}.tar.gz"
          ZIP_FILE="out/gemini-mem-${VERSION}.zip"

          tar -tzf "${TAR_FILE}" > out/tar-contents.txt
          unzip -Z1 "${ZIP_FILE}" > out/zip-contents.txt

          grep -qx "gemini-extension.json" out/tar-contents.txt
          grep -qx "README.md" out/tar-contents.txt
          grep -qx "LICENSE" out/tar-contents.txt
          grep -qx "hooks/hooks.json" out/tar-contents.txt
          grep -qx "scripts/hook-runner.cjs" out/tar-contents.txt
          grep -q "^commands/" out/tar-contents.txt
          grep -q "^dist/" out/tar-contents.txt

          grep -qx "gemini-extension.json" out/zip-contents.txt
          grep -qx "README.md" out/zip-contents.txt
          grep -qx "LICENSE" out/zip-contents.txt
          grep -qx "hooks/hooks.json" out/zip-contents.txt
          grep -qx "scripts/hook-runner.cjs" out/zip-contents.txt
          grep -q "^commands/" out/zip-contents.txt
          grep -q "^dist/" out/zip-contents.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files: |
            out/gemini-mem-*.tar.gz
            out/gemini-mem-*.zip
            out/SHA256SUMS.txt
