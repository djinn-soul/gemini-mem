name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches versions
        run: |
          node -e "const tag=process.env.GITHUB_REF_NAME.replace(/^v/,'');const p=require('./package.json').version;const m=require('./gemini-extension.json').version;if(tag!==p||tag!==m){console.error(`Version mismatch. tag=${tag}, package.json=${p}, gemini-extension.json=${m}`);process.exit(1);}"

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Create release archives
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="out/stage"
          mkdir -p "${STAGE}"
          mkdir -p "${STAGE}/dist" "${STAGE}/hooks" "${STAGE}/commands"

          cp gemini-extension.json "${STAGE}/"
          cp README.md "${STAGE}/"
          cp LICENSE "${STAGE}/"
          cp hooks/hooks.json "${STAGE}/hooks/hooks.json"
          cp -R commands/. "${STAGE}/commands/"
          cp -R dist/. "${STAGE}/dist/"

          tar -C "${STAGE}" -czf "out/gemini-mem-${VERSION}.tar.gz" .
          (
            cd "${STAGE}"
            zip -rq "../gemini-mem-${VERSION}.zip" .
          )
          sha256sum out/gemini-mem-"${VERSION}".tar.gz out/gemini-mem-"${VERSION}".zip > out/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/gemini-mem-*.tar.gz
            out/gemini-mem-*.zip
            out/SHA256SUMS.txt
